<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in to GitHub</title>
    <link rel="stylesheet" href="./output.css" />
    <link rel="stylesheet" href="./index.css" />
    <script src="https://tailwindcss.com"></script>
  </head>
  <!-- Main layout container uses space-y to elegantly separate blocks without overlap -->
  <body
    class="min-h-screen bg-black text-white font-sans flex flex-col items-center justify-center p-4 space-y-6"
  >
      <!-- Logo Section -->
        <div class="flex justify-center">
          <svg
            aria-hidden="true"
            viewBox="0 0 16 16"
            version="1.1"
            class="h-12 w-12 fill-white"
          >
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82A7.48 7.48 0 0 0 8 2.81c-.68.003-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.16.73.72.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
        </div>
      <!-- Heading Title — Fixed clean margins -->
        <h1 class="text-2xl font-light tracking-tight text-center">
          Sign in to GitHub
        </h1>

      <!-- Locked Layout Core Block — Clean max-width layout -->

      <div class="w-full max-w-[340px]">
        <form action="#" method="POST" class="space-y-4">
          <!-- Username Field Grid Box -->
          <div>
            <label
              for="username"
              class="mb-2 block text-sm font-normal text-[#e6edf3]"
            >
              Username or email address
            </label>
            <input
              type="text"
              id="username"
              name="username"
              class="h-10 w-full rounded-md border border-[#21262d] bg-[#0d1117] px-3 text-sm text-white focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] focus:outline-none transition-colors"
            />
          </div>

          <!-- Password Field Grid Box with Integrated Row Alignment -->
          <div>
            <div class="mb-2 flex justify-between items-center">
              <label for="password" class="text-sm font-normal text-[#e6edf3]"
                >Password</label
              >
              <a
                href="#"
                class="text-xs font-normal text-[#58a6ff] hover:underline"
                >Forgot password?</a
              >
            </div>
            <input
              type="password"
              id="password"
              name="password"
              class="h-10 w-full rounded-md border border-[#21262d] bg-[#0d1117] px-3 text-sm text-white focus:border-[#58a6ff] focus:ring-1 focus:ring-[#58a6ff] focus:outline-none transition-colors"
            />
          </div>
          <!-- Sign In Submission Button Element -->
          <button
            class="h-10 w-full rounded-md bg-[#238636] text-[0.9rem] font-semibold text-white hover:bg-[#2ea043] transition-colors active:scale-[0.98] transition-all-1s"
            type="submit"
          >
            Sign in
          </button>

          <!-- Clean, Non-breakable Responsive Horizontal Line Break Layout -->
          <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-[#21262d]"></div>
            <span class="flex-shrink mx-4 text-xs font-normal text-zinc-500"
              >or</span
            >
            <div class="flex-grow border-t border-[#21262d]"></div>
          </div>

          <!-- Verified Google Provider Wrapper -->
          <button
            class="flex h-10 w-full items-center justify-center gap-3 rounded-md border border-[#35393d] bg-[#1a212c] text-[0.9rem] text-white hover:bg-[#212731] transition-all active:scale-[0.98] transition-all-1s"
            type="button"
          >
            <svg
              class="h-5 w-5 shrink-0"
              viewBox="0 0 24 24"
              xmlns="http://w3.org"
            >
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"
              />
            </svg>
            <span>Continue with Google</span>
          </button>

          <!-- Verified Apple Provider Wrapper -->
          <button
            class="flex h-10 w-full items-center justify-center gap-3 rounded-md border border-[#35393d] bg-[#1a212c] text-[0.9rem] text-white hover:bg-[#212731] transition-all-1s active:scale-[0.98]"
            type="button"
          >
            <svg
              class="h-5 w-5 shrink-0 fill-white"
              viewBox="0 0 24 24"
              xmlns="http://w3.org"
            >
              <path
                d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.51 12.06 1.005 1.45 2.187 3.068 3.761 3.008 1.515-.06 2.09-.98 3.923-.98 1.83 0 2.35.98 3.924.95 1.603-.03 2.637-1.47 3.614-2.89 1.135-1.656 1.603-3.258 1.63-3.34-.06-.03-3.13-1.2-3.165-4.787-.03-2.99 2.446-4.428 2.56-4.5-1.398-2.05-3.56-2.29-4.32-2.35-2.02-.16-3.94 1.215-4.976 1.215zm3.264-4.718c.846-1.025 1.41-2.454 1.255-3.878-1.22.05-2.697.818-3.57 1.844-.764.887-1.43 2.34-1.25 3.737 1.356.105 2.72-.68 3.565-1.703z"
              />
            </svg>
            <span>Continue with Apple</span>
          </button>

          <!-- Base Footer Panel Info Box -->
          <div class="flex justify-center pt-2 text-sm">
            <p class="text-zinc-400">
              New to GitHub?
              <a href="#" class="text-[#58a6ff] pl-1 hover:underline"
                >Create an account</a
              >
            </p>
          </div>
        </form>
      </div>
  </body>
</html>
